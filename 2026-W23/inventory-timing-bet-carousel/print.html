<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Supply Chain Signals - Inventory Timing Bet Carousel</title>
  <style>
    @page {
      size: 1080px 1080px;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050505;
    }

    .slide {
      width: 1080px;
      height: 1080px;
      page-break-after: always;
      break-after: page;
      overflow: hidden;
      background: #050505;
    }

    .slide:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    img {
      display: block;
      width: 1080px;
      height: 1080px;
    }
  </style>
</head>
<body>
  <section class="slide"><img src="slide-01.svg" alt="Slide 1"></section>
  <section class="slide"><img src="slide-02.svg" alt="Slide 2"></section>
  <section class="slide"><img src="slide-03.svg" alt="Slide 3"></section>
  <section class="slide"><img src="slide-04.svg" alt="Slide 4"></section>
  <section class="slide"><img src="slide-05.svg" alt="Slide 5"></section>
  <section class="slide"><img src="slide-06.svg" alt="Slide 6"></section>
  <section class="slide"><img src="slide-07.svg" alt="Slide 7"></section>
  <section class="slide"><img src="slide-08.svg" alt="Slide 8"></section>
</body>
</html>

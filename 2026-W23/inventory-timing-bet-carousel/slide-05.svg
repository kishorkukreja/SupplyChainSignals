<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="Same stock. Different bets.">
  <defs>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .sans { font-family: Inter, Arial, Helvetica, sans-serif; }
      .mono { font-family: 'Arial Narrow', 'Roboto Condensed', Arial, sans-serif; }
    </style>
    <radialGradient id="glow" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#glow)"/>
  <rect x="28" y="28" width="1024" height="1024" fill="none" stroke="#f5f1ea" stroke-width="1" opacity="0.18"/>
  
    <text x="64" y="78" class="mono" font-size="21" letter-spacing="6" fill="#b8b1a7">DECISION QUALITY</text>
    <line x1="64" y1="104" x2="1016" y2="104" stroke="#d60000" stroke-width="3" opacity="0.85"/>
  
  
    <text x="64" y="210" class="serif" font-size="86" font-weight="800" fill="#f5f1ea">Same stock.</text>
    <text x="64" y="315" class="serif" font-size="112" font-weight="900" fill="#d60000">Different bets.</text>
  
  <text x="68" y="430" class="sans" font-size="30" font-weight="500" fill="#f5f1ea">Demand confidence.</text>
<text x="68" y="475" class="sans" font-size="30" font-weight="500" fill="#f5f1ea">Tariff fear.</text>
<text x="68" y="520" class="sans" font-size="30" font-weight="500" fill="#f5f1ea">Supplier distrust.</text>
<text x="68" y="565" class="sans" font-size="30" font-weight="500" fill="#f5f1ea">Rate avoidance.</text>
<text x="68" y="610" class="sans" font-size="30" font-weight="500" fill="#f5f1ea">No better choice.</text>
  <g transform="translate(92 575)">
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="250" height="82" fill="#171717" stroke="#d60000" stroke-width="2"/>
      <text x="24" y="51" class="mono" font-size="22" letter-spacing="3" fill="#f5f1ea">DEMAND</text>
    </g>
  

    <g transform="translate(300 0)">
      <rect x="0" y="0" width="250" height="82" fill="#171717" stroke="#d60000" stroke-width="2"/>
      <text x="24" y="51" class="mono" font-size="22" letter-spacing="3" fill="#f5f1ea">TARIFF</text>
    </g>
  

    <g transform="translate(600 0)">
      <rect x="0" y="0" width="250" height="82" fill="#171717" stroke="#d60000" stroke-width="2"/>
      <text x="24" y="51" class="mono" font-size="22" letter-spacing="3" fill="#f5f1ea">SUPPLIER</text>
    </g>
  

    <g transform="translate(0 125)">
      <rect x="0" y="0" width="250" height="82" fill="#171717" stroke="#d60000" stroke-width="2"/>
      <text x="24" y="51" class="mono" font-size="22" letter-spacing="3" fill="#f5f1ea">FREIGHT</text>

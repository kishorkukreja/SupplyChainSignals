      <text x="24" y="51" class="mono" font-size="22" letter-spacing="3" fill="#f5f1ea">LAST RESORT</text>
    </g>
  </g>
  
    <text x="64" y="1008" class="mono" font-size="22" letter-spacing="7" fill="#f5f1ea">EST. 2026</text>
    <text x="418" y="1008" class="mono" font-size="20" letter-spacing="8" fill="#f5f1ea">FOLLOW THE CONSTRAINT</text>
    <text x="920" y="1008" class="mono" font-size="22" letter-spacing="5" fill="#f5f1ea">05/08</text>
  

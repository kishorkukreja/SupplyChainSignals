  <text x="68" y="430" class="sans" font-size="30" font-weight="500" fill="#f5f1ea">ISM Services inventories hit 62.5 in May.</text>
<text x="68" y="475" class="sans" font-size="30" font-weight="500" fill="#f5f1ea">That matched the highest reading since the series began in 1997.</text>
  

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="Segment before you argue">
  <defs>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .sans { font-family: Inter, Arial, Helvetica, sans-serif; }
      .mono { font-family: 'Arial Narrow', 'Roboto Condensed', Arial, sans-serif; }
    </style>
    <radialGradient id="glow" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#glow)"/>
  <rect x="28" y="28" width="1024" height="1024" fill="none" stroke="#f5f1ea" stroke-width="1" opacity="0.18"/>
  
    <text x="64" y="78" class="mono" font-size="21" letter-spacing="6" fill="#b8b1a7">OPERATOR MOVE</text>
    <line x1="64" y1="104" x2="1016" y2="104" stroke="#d60000" stroke-width="3" opacity="0.85"/>
  
  
    <text x="64" y="210" class="serif" font-size="86" font-weight="800" fill="#f5f1ea">Segment before</text>
    <text x="64" y="315" class="serif" font-size="112" font-weight="900" fill="#d60000">you argue</text>
  
  <text x="68" y="430" class="sans" font-size="30" font-weight="500" fill="#f5f1ea">Tag inventory by reason.</text>
<text x="68" y="475" class="sans" font-size="30" font-weight="500" fill="#f5f1ea">Then set sell-through, reorder, and stop-buy triggers.</text>
  
      <g transform="translate(78 545)">
        <text x="0" y="0" class="mono" font-size="22" letter-spacing="3" fill="#f5f1ea">SERVICE BUFFER</text>
<text x="0" y="50" class="mono" font-size="22" letter-spacing="3" fill="#f5f1ea">TARIFF HEDGE</text>
<text x="0" y="100" class="mono" font-size="22" letter-spacing="3" fill="#f5f1ea">FREIGHT HEDGE</text>
<text x="0" y="150" class="mono" font-size="22" letter-spacing="3" fill="#f5f1ea">SUPPLIER RISK</text>
<text x="0" y="200" class="mono" font-size="22" letter-spacing="3" fill="#f5f1ea">SEASONAL BUILD</text>
<text x="0" y="250" class="mono" font-size="22" letter-spacing="3" fill="#f5f1ea">OLD FORECAST</text>
        <rect x="520" y="-15" width="350" height="54" fill="none" stroke="#d60000" stroke-width="3"/><text x="552" y="22" class="mono" font-size="22" letter-spacing="3" fill="#d60000">SELL-THROUGH</text>
<rect x="520" y="77" width="350" height="54" fill="none" stroke="#d60000" stroke-width="3"/><text x="552" y="114" class="mono" font-size="22" letter-spacing="3" fill="#d60000">REORDER</text>
<rect x="520" y="169" width="350" height="54" fill="none" stroke="#d60000" stroke-width="3"/><text x="552" y="206" class="mono" font-size="22" letter-spacing="3" fill="#d60000">STOP-BUY</text>
      </g>
    
  
    <text x="64" y="1008" class="mono" font-size="22" letter-spacing="7" fill="#f5f1ea">EST. 2026</text>
    <text x="418" y="1008" class="mono" font-size="20" letter-spacing="8" fill="#f5f1ea">FOLLOW THE CONSTRAINT</text>
    <text x="920" y="1008" class="mono" font-size="22" letter-spacing="5" fill="#f5f1ea">07/08</text>
  
</svg>